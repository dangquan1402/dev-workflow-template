name: "Bug Report"
description: "Report broken behavior"
labels: ["bug"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 — System down / data loss
        - P1 — Major feature broken, no workaround
        - P2 — Feature broken, workaround exists
        - P3 — Minor issue
    validations:
      required: true

  - type: checkboxes
    id: diagnosis-checklist
    attributes:
      label: "Diagnosis Checklist"
      options:
        - label: "Root cause identified"
        - label: "Regression test written (proves bug exists before fix)"
        - label: "Fix is minimal (no refactoring mixed in)"
        - label: "Docs updated (only if behavior changed)"
