name: "Feature Request"
description: "Propose new functionality"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work from the user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you evaluate?

  - type: checkboxes
    id: doc-first-checklist
    attributes:
      label: "Doc-First Checklist (complete before coding)"
      options:
        - label: "ADR written in `docs/decisions/` (if architectural)"
        - label: "ERD updated in `docs/reference/erd.md` (if new tables)"
        - label: "API contract defined in `docs/reference/api/` (if new endpoints)"
        - label: "Base class / conventions identified"

  - type: checkboxes
    id: implementation-checklist
    attributes:
      label: "Implementation Checklist"
      options:
        - label: "Code follows base class conventions"
        - label: "Unit + integration tests written"
        - label: "Docs updated in same PR"
        - label: "Changelog entry added"
